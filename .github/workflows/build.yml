name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install -r standalones/requirements-build.txt

      - name: Build executable
        working-directory: standalones
        run: pyinstaller move_anomalie.spec --distpath dist --workpath build/work --noconfirm

      - name: Smoke test executable
        working-directory: standalones
        shell: cmd
        run: |
          mkdir dist\subdir
          echo. > "dist\IMG_ABC123.jpg"
          echo. > "dist\IMG_ABC123.tif"
          echo. > "dist\subdir\IMG_ABC123.cr2"
          echo. > "dist\IMG_OTHER.jpg"
          echo IMG_ABC123 | ANOMALIA > dist\anomalie.txt
          (echo 2 & echo s) | dist\move_anomalie.exe
          if not exist "dist\Anomalie\IMG_ABC123.jpg"       (echo FAIL: jpg not moved      && exit /b 1)
          if not exist "dist\Anomalie\IMG_ABC123.tif"       (echo FAIL: tif not moved      && exit /b 1)
          if not exist "dist\Anomalie\subdir\IMG_ABC123.cr2"(echo FAIL: subdir not moved   && exit /b 1)
          if not exist "dist\IMG_OTHER.jpg"                 (echo FAIL: other file missing && exit /b 1)
          echo Smoke test passed.

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: move_anomalie-windows
          path: standalones/dist/move_anomalie.exe

  build-macos:
    name: Build macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install -r standalones/requirements-build.txt

      - name: Build binary
        working-directory: standalones
        run: pyinstaller move_anomalie.spec --distpath dist --workpath build/work --noconfirm

      - name: Smoke test binary
        working-directory: standalones
        run: |
          mkdir -p dist/subdir
          touch dist/IMG_ABC123.jpg
          touch dist/IMG_ABC123.tif
          touch dist/subdir/IMG_ABC123.cr2
          touch dist/IMG_OTHER.jpg
          echo "IMG_ABC123 | ANOMALIA" > dist/anomalie.txt
          printf "2\ns\n" | ./dist/move_anomalie
          test -f dist/Anomalie/IMG_ABC123.jpg        || (echo "FAIL: jpg not moved"      && exit 1)
          test -f dist/Anomalie/IMG_ABC123.tif        || (echo "FAIL: tif not moved"      && exit 1)
          test -f dist/Anomalie/subdir/IMG_ABC123.cr2 || (echo "FAIL: subdir not moved"   && exit 1)
          test -f dist/IMG_OTHER.jpg                  || (echo "FAIL: other file missing" && exit 1)
          echo "Smoke test passed."

      - name: Zip macOS binary
        run: zip -j standalones/dist/move_anomalie-macos.zip standalones/dist/move_anomalie

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: move_anomalie-macos
          path: standalones/dist/move_anomalie-macos.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: move_anomalie-windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: move_anomalie-macos
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/move_anomalie.exe
            dist/move_anomalie-macos.zip
          generate_release_notes: true
